<!-- ──────────────── MAIN CONTENT ──────────────── -->
<main class="main">
  <iframe id="content-frame" class="content-frame" src="pages/colors.html"></iframe>
</main>

<script>
  const sidebar  = document.getElementById('sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  const toggle   = document.getElementById('menu-toggle');

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('open');
    toggle.classList.add('open');
  }

  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    toggle.classList.remove('open');
  }

  toggle.addEventListener('click', () =>
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
  );
  overlay.addEventListener('click', closeSidebar);

  function showPage(id) {
    document.getElementById('content-frame').src = `pages/${id}.html`;

    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.nav-link[data-page]').forEach(link => {
      if (link.dataset.page === id) link.classList.add('active');
    });

    history.replaceState(null, '', `#${id}`);
    closeSidebar();
  }

  const initial = location.hash.replace('#', '') || 'colors';
  showPage(initial);

  document.querySelectorAll('.nav-link[data-page]').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      showPage(link.dataset.page);
    });
  });
</script>
